
<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Mi Plataforma IPTV</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
<h1>📺 Mi Plataforma IPTV</h1>
</header>

<section class="player-section">
<div class="player-wrapper">
<video id="videoPlayer" controls></video>
</div>
</section>

  <h2>Cargar lista IPTV</h2>
  
<section class="playlist-loader">
<input id="m3uUrl" placeholder="Pega aquí la URL de tu lista .m3u">
<button onclick="loadPlaylist()">Cargar lista</button>
</section>
<div class="filters">

<select id="countryFilter">
<option value="">Todos los países</option>
</select>

<select id="languageFilter">
<option value="">Todos los idiomas</option>
</select>

</div>
  
<h2>Canales</h2>
<div id="channelList"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script src="model/channels.js"></script>
<script src="js/player.js"></script>
<script src="js/controller.js"></script>

</body>
</html>
